<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>EP VIZ</title>
  <style>
    html, body { margin:0; height:100%; background:#0e0e10; color:#ddd; overflow:hidden; }
    #top { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; gap:0; }
    .panel { position:relative; }
    canvas { display:block; width:100%; height:100%; }
    #ui {
      position: absolute; left: 12px; top: 12px; z-index: 10;
      font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 18px;
      background: rgba(0,0,0,0.45); padding: 10px 12px; border-radius: 10px;
      display: grid; gap: 8px; min-width: 360px;
    }
    .row { display:grid; grid-template-columns: 120px 1fr; align-items:center; gap:8px; }
    input[type="range"]{ width:100%; }
    .pill { padding:2px 6px; border-radius:999px; background:#1f1f26; display:inline-block; }
    .title { font-weight:600; }
    .label { position:absolute; left:10px; bottom:10px; background:rgba(0,0,0,.4); padding:4px 8px; border-radius:6px; font:12px ui-monospace,monospace; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="top">
    <div id="left" class="panel">
    </div>
    <div id="right" class="panel">
      <div class="label">CURVES (X=j, Y=f, Z=t)</div>
    </div>
  </div>
  <div id="ui">
    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 8px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <div>𝔽<span id="n" class="pill"><span id="divVal" class="pill"></span></div>
        <div id="n_buttons" style="display: flex; gap: 4px;">
          <label style="cursor: pointer; padding: 4px 10px; background: #2a2a30; border-radius: 6px; display: inline-block;">
            <input type="radio" name="n_select" value="1" style="margin-right: 4px;"> 1
          </label>
          <label style="cursor: pointer; padding: 4px 10px; background: #2a2a30; border-radius: 6px; display: inline-block;">
            <input type="radio" name="n_select" value="2" style="margin-right: 4px;"> 2
          </label>
          <label style="cursor: pointer; padding: 4px 10px; background: #2a2a30; border-radius: 6px; display: inline-block;">
            <input type="radio" name="n_select" value="3" style="margin-right: 4px;"> 3
          </label>
          <label style="cursor: pointer; padding: 4px 10px; background: #2a2a30; border-radius: 6px; display: inline-block;">
            <input type="radio" name="n_select" value="4" style="margin-right: 4px;"> 4
          </label>
          <label style="cursor: pointer; padding: 4px 10px; background: #2a2a30; border-radius: 6px; display: inline-block;">
            <input type="radio" name="n_select" value="5" style="margin-right: 4px;"> 5
          </label>
          <label style="cursor: pointer; padding: 4px 10px; background: #2a2a30; border-radius: 6px; display: inline-block;">
            <input type="radio" name="n_select" value="6" style="margin-right: 4px;"> 6
          </label>
          <label style="cursor: pointer; padding: 4px 10px; background: #2a2a30; border-radius: 6px; display: inline-block;">
            <input type="radio" name="n_select" value="7" style="margin-right: 4px;"> 7
          </label>
          <label style="cursor: pointer; padding: 4px 10px; background: #2a2a30; border-radius: 6px; display: inline-block;">
            <input type="radio" name="n_select" value="8" style="margin-right: 4px;"> 8
          </label>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div>ℓ:</div>
        <select id="ell_select" style="background: #2a2a30; color: #ddd; border: 1px solid #444; padding: 6px 10px; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; cursor: pointer; min-width: 100px;">
          <option value="ALL">ALL</option>
          <!-- Dynamic ell values will be inserted here -->
        </select>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <button id="layout_toggle" style="background: #2a2a30; color: #ddd; border: 1px solid #444; padding: 6px 12px; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; cursor: pointer; font-size: 14px;">
          Layout: Circle
        </button>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <button id="theme_toggle" style="background: #2a2a30; color: #ddd; border: 1px solid #444; padding: 6px 12px; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; cursor: pointer; font-size: 14px;">
          ☀ Light
        </button>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <button id="export_png" title="Export high-DPI PNG from active pane" style="background: #2a2a30; color: #ddd; border: 1px solid #444; padding: 6px 12px; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; cursor: pointer; font-size: 14px;">
          Export PNG 2x
        </button>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div>D:</div>
        <input type="number" id="d_input" placeholder="discriminant" style="background: #2a2a30; color: #ddd; border: 1px solid #444; padding: 6px 10px; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; width: 120px;">
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div>j:</div>
        <input type="text" id="j_input" placeholder="j-invariant" style="background: #2a2a30; color: #ddd; border: 1px solid #444; padding: 6px 10px; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; width: 120px;">
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div>A:</div>
        <input type="text" id="a_input" placeholder="A coeff" style="background: #2a2a30; color: #ddd; border: 1px solid #444; padding: 6px 10px; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; width: 100px;">
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div>B:</div>
        <input type="text" id="b_input" placeholder="B coeff" style="background: #2a2a30; color: #ddd; border: 1px solid #444; padding: 6px 10px; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; width: 100px;">
      </div>
    </div>
    <div id="status"></div>
    <div id="nr_field_info"></div>
  </div>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
