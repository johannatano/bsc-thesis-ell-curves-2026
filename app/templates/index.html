<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>EP VIZ</title>
  <style>
    html, body { margin:0; height:100%; background:#0e0e10; color:#ddd; overflow:hidden; }
    #top { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; gap:0; }
    .panel { position:relative; }
    canvas { display:block; width:100%; height:100%; }
    .minimal-control {
      background: #000;
      color: #fff;
      border: 1px solid #444;
      padding: 6px 10px;
      border-radius: 6px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      box-shadow: none;
      outline: none;
    }
    .minimal-control::placeholder {
      color: rgba(255, 255, 255, 0.72);
    }
    #ui {
      position: absolute; right: 12px; bottom: 72px; z-index: 10;
      font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 18px;
      background: transparent; padding: 10px 12px; border-radius: 10px;
      display: grid; gap: 8px; min-width: 360px;
    }
    #selected_curve_bar {
      position: absolute;
      left: 50%;
      right: 12px;
      bottom: 12px;
      z-index: 12;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 24px;
      padding: 10px 14px;
      border-radius: 10px;
      box-sizing: border-box;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 14px;
      text-align: right;
      pointer-events: none;
      background: rgba(0,0,0,0.45);
      border: 1px solid #444;
      backdrop-filter: blur(6px);
    }
    #selected_field_bar {
      position: absolute;
      left: calc(10vw + 40px);
      right: calc(50% + 20px);
      bottom: 12px;
      z-index: 12;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      min-height: 24px;
      padding: 10px 14px;
      border-radius: 10px;
      box-sizing: border-box;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 14px;
      text-align: left;
      pointer-events: none;
      background: rgba(0,0,0,0.45);
      border: 1px solid #444;
      backdrop-filter: blur(6px);
    }
    #selected_field_bar.is-empty { opacity: 0.8; }
    #selected_curve_bar.is-empty { opacity: 0.8; }
    .curve-bar-section {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .curve-bar-section.left {
      justify-content: flex-start;
      text-align: left;
    }
    .curve-bar-section.right {
      justify-content: flex-end;
      text-align: right;
      margin-left: auto;
    }
    .curve-bar-label {
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
    }
    .curve-bar-value {
      font-size: 15px;
      font-weight: 600;
    }
    #ui_fq {
      position: absolute; left: 0; right: 0; top: 0; z-index: 40;
      font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 14px;
      background: #000;
      padding: 10px 12px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: flex-start;
      gap: 8px;
      align-items: center;
    }
    .topbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #n_select {
      display: block;
      cursor: pointer;
      min-width: 120px;
    }
    #ui_fq #ell_select {
      cursor: pointer;
      min-width: 100px;
    }
    #ui_top {
      position: absolute; left: 50%; top: 56px; z-index: 11;
      font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 14px;
      background: transparent; padding: 10px 12px; border-radius: 10px;
      display: grid; gap: 8px; min-width: 360px; max-width: calc(50vw - 24px);
      max-height: calc(46vh - 44px); overflow: hidden;
      white-space: nowrap;
    }
    #conductors_list {
      position: absolute;
      top: 56px;
      left: calc(10vw + 40px);
      right: calc(50% + 20px);
      z-index: 11;
      display: none;
      padding: 10px 12px;
      background: transparent;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 14px;
      color: #fff;
      line-height: 1.35;
      white-space: nowrap;
      text-align: left;
      box-sizing: border-box;
      overflow: hidden;
    }
    .row { display:grid; grid-template-columns: 120px 1fr; align-items:center; gap:8px; }
    input[type="range"]{ width:100%; }
    .pill { padding:2px 6px; border-radius:999px; background:#1f1f26; display:inline-block; }
    .title { font-weight:600; }
    .label { position:absolute; left:10px; bottom:10px; background:rgba(0,0,0,.4); padding:4px 8px; border-radius:6px; font:12px ui-monospace,monospace; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="top">
    <div id="left" class="panel">
    </div>
    <div id="right" class="panel">
    </div>
  </div>
  <div id="ui_fq">
    <div class="topbar-group">
      <select id="n_select" class="minimal-control" aria-label="Field select"></select>
    </div>
    <div class="topbar-group">
      <select id="ell_select" class="minimal-control" aria-label="Ell select">
        <option value="ALL">ℓ</option>
        <!-- Dynamic ell values will be inserted here -->
      </select>
    </div>
  </div>
  <div id="ui">
    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 8px;">
      <div style="display: none; align-items: center; gap: 8px;">
        <button id="export_png" title="Export high-DPI PNG from active pane" style="background: #2a2a30; color: #ddd; border: 1px solid #444; padding: 6px 12px; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; cursor: pointer; font-size: 14px;">
          Export PNG 2x
        </button>
      </div>
      <div style="display: none; align-items: center; gap: 8px;">
        <input type="number" id="d_input" class="minimal-control" placeholder="D_K" style="width: 120px;">
      </div>
      <div style="display: none; align-items: center; gap: 8px;">
        <input type="text" id="j_input" class="minimal-control" placeholder="j-invariant" style="width: 120px;">
      </div>
    </div>
  </div>
  <div id="ui_top">
    <div id="status"></div>
    <div id="nr_field_info"></div>
  </div>
  <div id="conductors_list"></div>
  <div id="selected_field_bar" class="is-empty">
    <span id="selected_field_label" class="curve-bar-label">Selected field</span>
    <span id="selected_field_value" class="curve-bar-value">—</span>
  </div>
  <div id="selected_curve_bar" class="is-empty">
    <div class="curve-bar-section left">
      <span id="selected_ell_label" class="curve-bar-label">Volcano</span>
      <span id="selected_ell_value" class="curve-bar-value">—</span>
    </div>
    <div class="curve-bar-section right">
      <span id="selected_curve_label" class="curve-bar-label">Selected curve j</span>
      <span id="selected_curve_value" class="curve-bar-value">—</span>
    </div>
  </div>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
